# Production Database Configuration
# Supports PostgreSQL and MySQL
# Set database type via: spring.profiles.active=prod,postgresql or prod,mysql

# PostgreSQL Configuration (default for production)
spring.datasource.url=jdbc:postgresql://localhost:5432/fitness_centre
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=fitness_user
spring.datasource.password=fitness_password

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000

# Enable OTLP/Jaeger Tracing in Production
management.otlp.tracing.enabled=true
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
