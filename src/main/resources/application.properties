# H2 Database Configuration - Local Development
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# H2 Console (optional, for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# JWT Configuration
jwt.secret=your-secret-key-that-is-at-least-32-characters-long-for-hs256
jwt.expiration=900000
jwt.refreshExpirationDays=7

# Token Blacklist Configuration
token.blacklist.store=memory
# For production (uncomment or configure in application-prod.properties):
# token.blacklist.store=redis
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# Spring Boot Actuator & Prometheus Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always

# Distributed Tracing (Micrometer Tracing & OpenTelemetry)
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
# Local default: no-op trace exporter (disable sending but keep span generation in logs)
management.otlp.tracing.enabled=false
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
